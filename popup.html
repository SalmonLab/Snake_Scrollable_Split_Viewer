<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake-Scrollable Split Viewer</title>
    <style>
      :root {
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        padding: 12px;
        width: 240px;
        background: #111827;
        color: #e5e7eb;
      }
      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 10px;
      }
      select,
      button {
        border: 1px solid #475569;
        background: #1f2937;
        color: #e5e7eb;
        border-radius: 8px;
        padding: 8px 10px;
      }
      select {
        flex: 1;
      }
      button {
        cursor: pointer;
      }
      #status {
        font-size: 12px;
        opacity: 0.9;
        min-height: 18px;
      }
      .hint {
        font-size: 12px;
        color: #cbd5e1;
        margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <label for="columnCount">Split Columns</label>
    </div>
    <div class="row">
      <select id="columnCount">
        <option value="1">off</option>
        <option value="2">2 columns</option>
        <option value="3">3 columns</option>
      </select>
      <button id="applyBtn">Apply</button>
    </div>
    <div id="status"></div>
    <div class="hint">2/3 columns are synced by the same page scroll.</div>

    <script src="popup.js"></script>
  </body>
</html>
